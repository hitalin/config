# Felix Configuration - Catppuccin Mocha Theme
# https://github.com/kyoheiu/felix

# Syntax highlighting in preview mode
syntax_highlight: true
default_theme: Base16MochaDark

# Catppuccin Mocha color scheme (RGB values)
color:
  dir_fg: Rgb(137, 180, 250)       # blue #89b4fa
  file_fg: Rgb(205, 214, 244)      # text #cdd6f4
  symlink_fg: Rgb(148, 226, 213)   # teal #94e2d5
  dirty_fg: Rgb(243, 139, 168)     # red #f38ba8
