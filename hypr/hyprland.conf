# Hyprland Configuration - Catppuccin Mocha Theme

source = ~/.config/hypr/mocha.conf

# Monitor
monitor = ,preferred,auto,auto

# Autostart
exec-once = waybar
exec-once = hyprpaper
exec-once = dropbox
exec-once = fcitx5 -d --replace
exec-once = LC_CTYPE=ja_JP.UTF-8 emacs --daemon
exec-once = [workspace 1 silent] wezterm
exec-once = [workspace 2 silent] firefox
exec-once = [workspace 3 silent] keepassxc

# Environment
env = XCURSOR_SIZE,24

# Input
input {
    kb_layout = jp
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0
}

# General
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

# Decoration
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Animations
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 5, default
    animation = borderangle, 1, 3, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 1, default
}

# Dwindle Layout
dwindle {
    pseudotile = true
    preserve_split = true
}

# Master Layout
master {
    # new_is_master removed in Hyprland 0.41+
}

# Gestures
gestures {
    workspace_swipe = false
}

# Misc
misc {
    force_default_wallpaper = 1
}

# Keybinds
$mainMod = SUPER
$term = wezterm

bind = $mainMod, Return, exec, $term
bind = $mainMod, F, fullscreen
bind = $mainMod, F4, killactive
bind = $mainMod SHIFT, Q, exec, wlogout
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, d, exec, wofi --show drun --width 512px
bind = $mainMod, period, exec, wofi-emoji
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# Focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, right, movetoworkspace, m+1
bind = $mainMod SHIFT, left, movetoworkspace, m-1

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
