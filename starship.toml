format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
truncation_length = 10
truncate_to_repo = false
style = "blue"

[character]
success_symbol = "[‚ĚĮ](purple)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[git_branch]
format = "[$branch]($style)"
style = "white"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "white"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "white"
