format = """
$time\
$username\
$hostname\
$directory\
$direnv\
$git_branch\
$git_commit\
$git_state\
$git_status\
$line_break\
$nodejs\
$python\
$status\
$character"""

right_format = """$cmd_duration"""

palette = "catppuccin_mocha"

[directory]
truncation_length = 10
truncate_to_repo = false
style = "blue"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "white"

[git_commit]
format = "[($hash)]($style) "
commit_hash_length = 7
style = "green"

[direnv]
disabled = false
format = "[$symbol]($style) "
symbol = "❄ "
style = "teal"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "white"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%Y-%m-%d %H:%M:%S"
style = "surface2"

[nodejs]
format = "[$version]($style) "
style = "green"

[python]
format = "[$virtualenv]($style) "
style = "white"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✖ "
style = "red"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
